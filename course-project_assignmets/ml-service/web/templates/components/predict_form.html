<div class="card">
  <div class="card__header">
    <h3 class="card__title">ML-предсказание</h3>
  </div>

  <form action="/predict" method="post" class="predict-form">
    <div class="form-group">
      <label class="label" for="model_id">Модель</label>
      <select name="model_id" id="model_id" class="input" required>
        {% for model in models %}
          <option value="{{ model.id }}">
            {{ model.name }} — {{ model.cost_per_prediction }} кред.
          </option>
        {% endfor %}
      </select>
    </div>

    <div class="form-group">
      <label class="label" for="input_data">
        Данные <span class="hint">(каждый признак на новой строке: ключ: значение)</span>
      </label>
      <textarea
        name="input_data"
        id="input_data"
        class="input textarea"
        rows="8"
        placeholder="mean radius: 14.5&#10;mean texture: 20.1&#10;mean area: 600.0"
        required
      ></textarea>
    </div>

    <div class="template-hint" id="template-hint"></div>

    <button type="submit" class="btn btn--primary btn--full">
      Выполнить предсказание
    </button>
  </form>
</div>
