upstream web {
    server web:5000;
}

upstream app {
    server app:8000;
}
upstream web {
    server web:5000;
}

server {
    listen 80;
    server_name _;

    # Web-интерфейс (Flask)
    location / {
        proxy_pass http://web;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # REST API (FastAPI) — доступен по /api/
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://app;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Swagger UI FastAPI — напрямую
    location /docs {
        proxy_pass http://app/docs;
        proxy_set_header Host $host;
    }
    location /openapi.json {
        proxy_pass http://app/openapi.json;
    }


    # Web-интерфейс (Flask)
    location /ui/ {
        rewrite ^/ui/(.*) /$1 break;
        proxy_pass http://web;
        proxy_set_header Host $host;
    }

    location /health {
        proxy_pass http://app/health;
        access_log off;
    }
}
