version: '3.8'

services:
  app:
    build: ./app
    env_file:
      - .env
    volumes:
      - ./app/src:/app
    depends_on:
      - database
      - rabbitmq
    restart: unless-stopped

  web-proxy:
    build: ./web-proxy
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"      # AMQP
      - "15672:15672"    # Management UI
    volumes:
      - ./data/rabbitmq:/var/lib/rabbitmq
    restart: always

  database:
    image: postgres:13
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydb
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    restart: unless-stopped